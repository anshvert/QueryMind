
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api {
            proxy_pass http://querymind-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
        }

        location /metrics {
            proxy_pass http://querymind-backend:8000/metrics;
        }

        location /docs {
            proxy_pass http://querymind-backend:8000/docs;
        }

        location /redoc {
            proxy_pass http://querymind-backend:8000/redoc;
        }

        location /openapi.json {
            proxy_pass http://querymind-backend:8000/openapi.json;
        }
    }
}
